# Alembic 配置文件
# sqlalchemy.url 留空，运行时由 alembic/env.py 从 app.config 注入

[alembic]
script_location = alembic

# 模板路径（默认即可）
# file_template = %%(rev)s_%%(slug)s

# 时区
timezone = Asia/Shanghai

# sqlalchemy.url 留空，由 env.py 注入
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
