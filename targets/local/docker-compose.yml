# NetLearn 靶机 docker-compose
#
# 使用方法：
#   1. 安装 Docker: https://www.docker.com/products/docker-desktop
#   2. 进入此目录: cd targets/local
#   3. 启动靶机:   docker-compose up -d
#   4. 查看地址:
#      - 靶机1 (Nginx Flag 隐藏):   http://localhost:8081
#      - 靶机2 (SSH 弱口令):        http://localhost:8082
#      - 靶机3 (SQL 注入):          http://localhost:8083
#      - 靶机4 (XSS 反射型):        http://localhost:8084
#      - 靶机5 (命令注入):          http://localhost:8085
#      - 靶机6 (本地文件包含):      http://localhost:8086
#      - 靶机7 (CSRF):              http://localhost:8087
#      - 靶机8 (XXE):               http://localhost:8088
#      - 靶机9 (SSRF):              http://localhost:8089
#      - 靶机10 (文件上传):         http://localhost:8090
#      - 靶机11 (越权访问):         http://localhost:8091
#      - 靶机12 (弱加密):           http://localhost:8092
#      - 靶机13 (DNS 欺骗):         http://localhost:8093
#      - 靶机14 (ARP 欺骗):         http://localhost:8094
#      - 靶机15 (端口扫描):         http://localhost:8095
#      - 靶机16 (代理 SSRF):        http://localhost:8096
#      - 靶机17 (WiFi 破解):        http://localhost:8097
#      - 靶机18 (防火墙绕过):       http://localhost:8098
#      - 靶机19 (VPN 配置):         http://localhost:8099
#      - 靶机20 (流量分析):         http://localhost:8100
#      - 靶机21 (SSTI 模板注入):    http://localhost:8101
#      - 靶机22 (JWT 伪造):         http://localhost:8102
#      - 靶机23 (反序列化):         http://localhost:8103
#      - 靶机24 (条件竞争):         http://localhost:8104
#      - 靶机25 (PHP 弱类型):       http://localhost:8105
#      - 靶机26 (CSP 绕过):         http://localhost:8106
#      - 靶机27 (原型链污染):       http://localhost:8107
#      - 靶机28 (请求走私):         http://localhost:8108
#      - 靶机29 (栈溢出):           http://localhost:8109
#      - 靶机30 (格式化字符串):     http://localhost:8110
#      - 靶机31 (UAF):              http://localhost:8111
#      - 靶机32 (RSA 小指数):       http://localhost:8112
#      - 靶机33 (RSA 共模):         http://localhost:8113
#      - 靶机34 (AES ECB):          http://localhost:8114
#      - 靶机35 (维吉尼亚):         http://localhost:8115
#      - 靶机36 (哈希长度扩展):     http://localhost:8116
#      - 靶机37 (XOR 逆向):         http://localhost:8117
#      - 靶机38 (反调试):           http://localhost:8118
#      - 靶机39 (算法逆向):         http://localhost:8119
#      - 靶机40 (UPX 脱壳):         http://localhost:8120
#      - 靶机41 (LSB 隐写):         http://localhost:8121
#      - 靶机42 (文件分离):         http://localhost:8122
#      - 靶机43 (ZIP 伪加密):       http://localhost:8123
#      - 靶机44 (EXIF 提取):        http://localhost:8124
#      - 靶机45 (音频隐写):         http://localhost:8125
#      - 靶机46 (PCAP 分析):        http://localhost:8126
#      - 靶机47 (USB 键盘):         http://localhost:8127
#      - 靶机48 (内存取证):         http://localhost:8128
#      - 靶机49 (日志分析):         http://localhost:8129
#      - 靶机50 (注册表取证):       http://localhost:8130
#   5. 把地址输入到网站即可开始挑战
#   6. 停止: docker-compose down

services:
